<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="stylesheet" href="chatgpt1.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap');
    </style>
</head>

<body>
    <header>
        <div class="top">
            <p class="menu"></p>
            <div class="bar">
                <p class="inMenu"></p>
                <div class="newchatcontainer">
                    <button class="NewChat">💬 New Chat</button>
                    <button class="Setting">⚙️ Settings</button>
                </div>
            </div>
            <span class="sitelogo">
           </span>
            <button class="log-in">Log In</button>
            <button class="sign-up">Sign Up </button>
        </div>
    </header>

    <main>
        <div class="menuHolder">
            <div class="SettingMenu">
                <div class="close_buttonHolder"><button class="close_settings">❌</button><div class="SettingsHeader">Settings</div></div>
                
                <hr>
                <div class="Setting1">
                <p class="AppearnceText"> Appearnce</p>
                <select class="Mode">
                    <option>Dark</option>
                    <option>Light</option>
                    
                </select>
                
                </div>
                <hr class="AppearnceLine">
                
            </div>
        </div>
        <div class="main content">
            <h1 class="text">Where should we begin?</h1>
            <button class="down">↓</button>
            <form>
                <div class="app">
                    <div class="messages"></div>

                    <div class="search">
                        <input class="search-bar" type="text" placeholder="Ask Anything">
                        <button class="go">↑</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <p class="outtext">By messaging ChatGPT, an AI chatbot, you agree to our Terms and have read our Privacy Policy.
            See Cookie Preferences.</p>
    </footer>

    <script type="module" src="chatgpt2.js"></script>

</body>

</html>
